# Netlify Build Configuration para Site Estático

[build]
  command = ""
  publish = "."

# Reescrever URLs para SPA (Single Page Application)
[[redirects]]
  from = "/*"
  to = "/"
  status = 200

# Cache control headers
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

[[headers]]
  for = "*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000"
