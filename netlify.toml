# Netlify Build Configuration para Site Estático HTML/CSS/JS

[build]
  # Nenhum build necessário - site estático puro
  command = ""
  # Diretório a publicar
  publish = "."

[build.environment]
  # Desabilitar o plugin Next.js automático
  NEXT_SKIP_EXPORT = "true"

# Reescrever URLs para SPA (Single Page Application)
[[redirects]]
  from = "/*"
  to = "/"
  status = 200

# Headers customizados
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"

# Cache de arquivos estáticos
[[headers]]
  for = "/style.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

[[headers]]
  for = "/script.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache"
