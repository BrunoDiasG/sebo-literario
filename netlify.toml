# Netlify Build Configuration

[build]
  # Comando a executar antes do deploy
  command = "echo 'Build completed'"
  # Diretório a publicar (site estático)
  publish = "."

# Reescrever URLs para SPA (Single Page Application)
[[redirects]]
  from = "/*"
  to = "/"
  status = 200

# Headers customizados
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"

# Cache de arquivos estáticos
[[headers]]
  for = "/style.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

[[headers]]
  for = "/script.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache"
