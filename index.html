<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sebo - Sua Biblioteca Digital</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ff785b">
</head>
<body>
    <header class="header shadow-sm">
        <div class="container">
            <div class="d-flex justify-content-between align-items-center py-3">
                <a href="#" class="logo" onclick="event.preventDefault(); showScreen('home')">📚 Sebo</a>
                <nav class="nav-buttons d-flex gap-2 align-items-center" id="navButtons">
                    <button class="navbar-toggler" type="button" aria-label="Menu" onclick="toggleMobileMenu()">
                        <span class="navbar-toggler-icon"></span>
                    </button>
                    <div id="navMenu" class="d-none mobile-menu">
                        <!-- Opções de navegação inseridas pelo JS -->
                    </div>
                </nav>
            </div>
        </div>
    </header>

    <main class="main py-4">
        <div class="container">
            <div id="loginScreen" class="screen active">
                <div class="auth-form card p-4 shadow-lg mx-auto">
                    <div class="card-body">
                        <h2 class="card-title text-center mb-4" style="color: var(--primary);">Entre no Sebo</h2>
                        <form id="loginForm">
                            <div class="mb-3">
                                <label for="loginEmail" class="form-label">Email</label>
                                <input type="email" class="form-control" id="loginEmail" required>
                            </div>
                            <div class="mb-3">
                                <label for="loginPassword" class="form-label">Senha</label>
                                <input type="password" class="form-control" id="loginPassword" required>
                            </div>
                            <button type="submit" class="btn btn-primary w-100 mb-3">Entrar</button>
                            <p class="text-center">
                                Não tem conta? <a href="#" onclick="event.preventDefault(); showScreen('register')" style="color: var(--primary);">Cadastre-se</a>
                            </p>
                        </form>
                    </div>
                </div>
            </div>

            <div id="registerScreen" class="screen">
                <div class="auth-form card p-4 shadow-lg mx-auto">
                    <div class="card-body">
                        <h2 class="card-title text-center mb-4" style="color: var(--primary);">Cadastro no Sebo</h2>
                        <form id="registerForm">
                            <div class="mb-3">
                                <label for="regName" class="form-label">Nome</label>
                                <input type="text" class="form-control" id="regName" required>
                            </div>
                            <div class="mb-3">
                                <label for="regEmail" class="form-label">Email</label>
                                <input type="email" class="form-control" id="regEmail" required>
                            </div>
                            <div class="mb-3">
                                <label for="regPassword" class="form-label">Senha</label>
                                <input type="password" class="form-control" id="regPassword" required>
                            </div>
                            <button type="submit" class="btn btn-primary w-100 mb-3">Cadastrar</button>
                            <p class="text-center">
                                Já tem conta? <a href="#" onclick="event.preventDefault(); showScreen('login')" style="color: var(--primary);">Entre aqui</a>
                            </p>
                        </form>
                    </div>
                </div>
            </div>

            <div id="homeScreen" class="screen">
                <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center mb-4 gap-3">
                    <h1>Biblioteca Digital</h1>
                    <div class="d-flex flex-column flex-sm-row gap-2 align-items-stretch">
                        <input type="text" class="form-control" id="searchInput" placeholder="Buscar livros e artigos...">
                        <select class="form-select" id="genreFilter">
                            <option value="">Todos os gêneros</option>
                            <option value="artigo">Artigo</option>
                            <option value="ficção">Ficção</option>
                            <option value="terror">Terror</option>
                            <option value="romance">Romance</option>
                            <option value="fantasia">Fantasia</option>
                            <option value="biografia">Biografia</option>
                            <option value="técnico">Técnico</option>
                            <option value="aventura">Aventura</option>
                            <option value="suspense">Suspense</option>
                            <option value="mistério">Mistério</option>
                            <option value="poesia">Poesia</option>
                            <option value="educacional">Educacional</option>
                            <option value="infantojuvenil">Infantojuvenil</option>
                            <option value="histórico">Histórico</option>
                        </select>
                        <button class="btn btn-primary text-nowrap" onclick="showScreen('add')">+ Adicionar Obra</button>
                    </div>
                </div>
                <div class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-lg-4 g-4" id="booksGrid">
                </div>
            </div>

            <div id="addScreen" class="screen">
                <div class="card p-4 shadow-lg mx-auto" style="max-width: 700px;">
                    <div class="card-body">
                        <h2 class="card-title text-center mb-4" style="color: var(--primary);">Adicionar Nova Obra</h2>
                        <form id="addBookForm">
                            <div class="mb-3">
                                <label for="bookTitle" class="form-label">Título</label>
                                <input type="text" class="form-control" id="bookTitle" required>
                            </div>
                            <div class="mb-3">
                                <label for="bookAuthor" class="form-label">Autor</label>
                                <input type="text" class="form-control" id="bookAuthor" required>
                            </div>
                            <div class="mb-3">
                                <label for="bookGenre" class="form-label">Gênero</label>
                                <select class="form-select" id="bookGenre" required>
                                    <option value="">Selecione um gênero</option>
                                    <option value="artigo">Artigo</option>
                                    <option value="ficção">Ficção</option>
                                    <option value="terror">Terror</option>
                                    <option value="romance">Romance</option>
                                    <option value="fantasia">Fantasia</option>
                                    <option value="biografia">Biografia</option>
                                    <option value="técnico">Técnico</option>
                                    <option value="aventura">Aventura</option>
                                    <option value="suspense">Suspense</option>
                                    <option value="mistério">Mistério</option>
                                    <option value="poesia">Poesia</option>
                                    <option value="educacional">Educacional</option>
                                    <option value="infantojuvenil">Infantojuvenil</option>
                                    <option value="histórico">Histórico</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label for="bookPDF" class="form-label">Arquivo PDF</label>
                                <input type="file" class="form-control" id="bookPDF" accept=".pdf" required>
                            </div>
                            <div class="mb-3">
                                <label for="bookDescription" class="form-label">Descrição</label>
                                <textarea class="form-control" id="bookDescription" placeholder="Breve descrição da obra..." rows="3"></textarea>
                            </div>
                            <div class="d-flex gap-2">
                                <button type="submit" class="btn btn-primary flex-grow-1">Adicionar Obra</button>
                                <button type="button" class="btn btn-secondary" onclick="showScreen('home')">Cancelar</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>

            <div id="readerScreen" class="screen">
                <div class="reader mx-auto" style="max-width: 800px;">
                    <div class="d-flex flex-column flex-sm-row justify-content-between align-items-sm-center mb-4 gap-3">
                        <button class="btn btn-secondary" onclick="goBackFromReader()">← Voltar</button>
                        <div class="d-flex gap-3 align-items-center">
                            <button class="theme-toggle" onclick="toggleTheme()" title="Alternar Tema">🌓</button>
                            <div class="font-control btn-group btn-group-sm" role="group" aria-label="Font size controls">
                                <span class="align-self-center me-2">Fonte:</span>
                                <button type="button" class="btn btn-outline-secondary" onclick="changeFontSize('small')">S</button>
                                <button type="button" class="btn btn-outline-secondary active" onclick="changeFontSize('medium')">M</button>
                                <button type="button" class="btn btn-outline-secondary" onclick="changeFontSize('large')">X</button>
                                <button type="button" class="btn btn-outline-secondary" onclick="changeFontSize('xlarge')">XL</button>
                            </div>
                        </div>
                    </div>
                    <div class="card shadow-sm">
                        <div class="card-body p-4 p-md-5 reader-content font-medium" id="readerContent">
                        </div>
                    </div>
                </div>
            </div>

            <div id="favoritesScreen" class="screen">
                <div class="container py-4">
                    <h2>Favoritos</h2>
                    <div id="favoritesList"></div>
                </div>
            </div>

            <div id="historyScreen" class="screen">
                <h1 class="mb-4">Histórico de Leitura</h1>
                <div id="historyList">
                </div>
            </div>

            <div id="profileScreen" class="screen">
                <div class="card shadow-sm mb-4">
                    <div class="card-body p-4">
                        <h1 class="card-title mb-4">Meu Perfil</h1>
                        <form id="profileForm">
                            <div class="mb-3">
                                <label for="profileName" class="form-label">Nome</label>
                                <input type="text" class="form-control" id="profileName">
                            </div>
                            <div class="mb-3">
                                <label for="profileEmail" class="form-label">Email</label>
                                <input type="email" class="form-control" id="profileEmail" readonly>
                            </div>
                            <button type="submit" class="btn btn-primary">Salvar Alterações</button>
                        </form>
                    </div>
                </div>

                <div class="card shadow-sm">
                    <div class="card-body p-4">
                        <h2 class="card-title mb-4">Estatísticas de Leitura</h2>
                        <div class="row row-cols-1 row-cols-sm-2 row-cols-md-4 g-3 text-center">
                            <div class="col">
                                <div class="stat-card p-3 rounded h-100">
                                    <span class="stat-number" id="totalBooksRead">0</span>
                                    <span class="stat-label">Obras Lidas</span>
                                </div>
                            </div>
                            <div class="col">
                                <div class="stat-card p-3 rounded h-100">
                                    <span class="stat-number" id="totalReadingTime">0h</span>
                                    <span class="stat-label">Tempo de Leitura</span>
                                </div>
                            </div>
                            <div class="col">
                                <div class="stat-card p-3 rounded h-100">
                                    <span class="stat-number" id="favoriteCount">0</span>
                                    <span class="stat-label">Favoritos</span>
                                </div>
                            </div>
                            <div class="col">
                                <div class="stat-card p-3 rounded h-100">
                                    <span class="stat-number" id="contributedBooks">0</span>
                                    <span class="stat-label">Obras Adicionadas</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- PDF.js CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.2.67/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.2.67/pdf.worker.min.js"></script>

    <!-- Convex Client Library -->
    <script src="https://cdn.jsdelivr.net/npm/convex@latest/dist/browser.js"></script>

    <!-- Convex Configuration (URL from environment) -->
    <script src="convex.config.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <script src="script.js"></script>
</body>
</html>
